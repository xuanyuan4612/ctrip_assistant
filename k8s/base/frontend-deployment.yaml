# =============================================================================
# Deployment: ctrip-frontend
# Nginx serving the Vue 3 static SPA.  Built from the frontend Dockerfile.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctrip-frontend
  namespace: ctrip-assistant
  labels:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ctrip-assistant
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctrip-assistant
        app.kubernetes.io/component: frontend
        app.kubernetes.io/version: latest
    spec:
      containers:
        - name: frontend
          image: ctrip/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          # --- Liveness & Readiness ---
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
