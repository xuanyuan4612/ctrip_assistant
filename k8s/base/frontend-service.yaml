# =============================================================================
# Service: ctrip-frontend
# ClusterIP service for the Nginx frontend.  Ingress routes "/" here.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ctrip-frontend
  namespace: ctrip-assistant
  labels:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
