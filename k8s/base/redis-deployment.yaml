# =============================================================================
# Deployment: redis
# Redis 7 (Alpine) for caching and SSE broadcast / chat history.
# Single-replica is sufficient for caching; for HA use Redis Sentinel or
# a managed service (ElastiCache, Memorystore).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ctrip-assistant
  labels:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: cache
    app.kubernetes.io/version: "7-alpine"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ctrip-assistant
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctrip-assistant
        app.kubernetes.io/component: cache
        app.kubernetes.io/version: "7-alpine"
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # --- Liveness & Readiness ---
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
