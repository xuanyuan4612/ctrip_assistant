# =============================================================================
# Service: redis
# ClusterIP service for Redis.  Backend pods connect via redis://redis:6379.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ctrip-assistant
  labels:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
