# =============================================================================
# Secret: ctrip-assistant-secret
# IMPORTANT: This file is a PLACEHOLDER with dummy values.
# In production, secrets MUST be managed via one of:
#   1) SealedSecrets  - https://github.com/bitnami-labs/sealed-secrets
#   2) External Secrets Operator - https://external-secrets.io/
#   3) SOPS + age (for GitOps workflows)
#   4) Manual replacement via: kubectl create secret generic ...
#
# The actual values used at runtime are determined by the overlay or
# by the external-secrets controller before the Secret reaches the cluster.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ctrip-assistant-secret
  namespace: ctrip-assistant
  labels:
    app.kubernetes.io/name: ctrip-assistant
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # --- Database ---
  # Format: mysql+aiomysql://user:password@mysql:3306/ctrip_assistant
  DATABASE_URL: "mysql+aiomysql://ctrip:changeme@mysql:3306/ctrip_assistant"

  # --- Authentication ---
  JWT_SECRET_KEY: "change-me-to-a-long-random-secret"

  # --- LLM API Keys ---
  LLM_API_KEY: "sk-placeholder-change-me"

  # --- Embedding ---
  EMBEDDING_API_KEY: "sk-placeholder-change-me"

  # --- MySQL Root Password (used by the StatefulSet init) ---
  MYSQL_ROOT_PASSWORD: "changeme-root-password"
