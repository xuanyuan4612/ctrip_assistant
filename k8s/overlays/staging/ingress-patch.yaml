# =============================================================================
# Patch: Set staging hostname.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ctrip-assistant-ingress
spec:
  rules:
    - host: staging.ctrip.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ctrip-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ctrip-app-backend
                port:
                  number: 8000
