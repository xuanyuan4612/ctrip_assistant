# =============================================================================
# Patch: Set replicas to 1 for staging to reduce resource consumption.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctrip-app-backend
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctrip-frontend
spec:
  replicas: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ctrip-app-backend
spec:
  minReplicas: 1
  maxReplicas: 5
